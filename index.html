<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR Drift: Suzuka</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>

    <div id="ui">
        <h1>FR Drift: Suzuka</h1>
        <label for="carSelect">Escolha seu Carro:</label>
        <select id="carSelect">
            <option value="0">Hachiroku (Clássico AE86)</option>
            <option value="1">Silvia (Drift King)</option>
            <option value="2">Godzilla (Super Esportivo)</option>
        </select>
        <div class="controls-hint">
            Controles: Setas ou WASD<br>
            Faça a curva rápido para iniciar o Drift!
        </div>
    </div>

    <div id="telemetry">
        <span id="speed">0</span> KM/H<br>
        <span id="driftPoints">DRIFT: 0</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="./script.js"></script>
  </body>
</html>
